name: Build APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
      - name: Create project
        run: flutter create --org com.cmatracker --project-name cma_study_tracker app
      - name: Copy source files
        run: |
          cp -rf lib/. app/lib/
          cp pubspec.yaml app/pubspec.yaml
      - name: Fix MainActivity for v2 embedding
        run: |
          cat > app/android/app/src/main/kotlin/com/cmatracker/cma_study_tracker/MainActivity.kt << 'EOF'
          package com.cmatracker.cma_study_tracker
          import io.flutter.embedding.android.FlutterActivity
          class MainActivity: FlutterActivity()
          EOF
      - name: Add permissions to AndroidManifest
        run: |
          sed -i 's/<uses-permission android:name="android.permission.INTERNET"\/>//' app/android/app/src/main/AndroidManifest.xml
          sed -i 's/<manifest xmlns:android="http:\/\/schemas.android.com\/apk\/res\/android">/<manifest xmlns:android="http:\/\/schemas.android.com\/apk\/res\/android">\n    <uses-permission android:name="android.permission.POST_NOTIFICATIONS"\/>\n    <uses-permission android:name="android.permission.SCHEDULE_EXACT_ALARM"\/>\n    <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED"\/>\n    <uses-permission android:name="android.permission.VIBRATE"\/>\n    <uses-permission android:name="android.permission.WAKE_LOCK"\/>/' app/android/app/src/main/AndroidManifest.xml
      - name: Build
        run: |
          cd app
          flutter pub get
          flutter build apk --debug
      - uses: actions/upload-artifact@v4
        with:
          name: CMA-Tracker-APK
          path: app/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30
