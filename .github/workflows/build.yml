name: Build APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
      - name: Create project
        run: flutter create --org com.cmatracker --project-name cma_study_tracker app
      - name: Copy files
        run: |
          cp -rf lib/. app/lib/
          cp pubspec.yaml app/pubspec.yaml
          cp -rf android/app/src/main/AndroidManifest.xml app/android/app/src/main/AndroidManifest.xml
      - name: Build
        run: |
          cd app
          flutter pub get
          flutter build apk --debug
      - uses: actions/upload-artifact@v4
        with:
          name: CMA-Tracker-APK
          path: app/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30
