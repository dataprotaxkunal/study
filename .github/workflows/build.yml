name: Build APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
      - name: Create project
        run: flutter create --org com.cmatracker --project-name cma_study_tracker app
      - name: Copy source files
        run: |
          cp -rf lib/. app/lib/
          cp pubspec.yaml app/pubspec.yaml
      - name: Patch AndroidManifest
        run: |
          cat > app/android/app/src/main/AndroidManifest.xml << 'XML'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>
              <uses-permission android:name="android.permission.SCHEDULE_EXACT_ALARM"/>
              <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED"/>
              <uses-permission android:name="android.permission.VIBRATE"/>
              <uses-permission android:name="android.permission.WAKE_LOCK"/>
              <application
                  android:label="CMA Tracker"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher"
                  android:enableOnBackInvokedCallback="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:taskAffinity=""
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data
                        android:name="io.flutter.embedding.android.NormalTheme"
                        android:resource="@style/NormalTheme"/>
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <receiver android:name="com.dexterous.flutterlocalnotifications.ScheduledNotificationReceiver" android:exported="false"/>
                  <receiver android:name="com.dexterous.flutterlocalnotifications.ScheduledNotificationBootReceiver" android:exported="false">
                      <intent-filter>
                          <action android:name="android.intent.action.BOOT_COMPLETED"/>
                          <action android:name="android.intent.action.MY_PACKAGE_REPLACED"/>
                          <action android:name="android.intent.action.QUICKBOOT_POWERON"/>
                      </intent-filter>
                  </receiver>
              </application>
          </manifest>
          XML
      - name: Build
        run: |
          cd app
          flutter pub get
          flutter build apk --debug
      - uses: actions/upload-artifact@v4
        with:
          name: CMA-Tracker-APK
          path: app/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30
